<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node Detail — EOSC Beyond Pilot Node Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:    #E8572A; --orange-dk: #C44520; --orange-lt: #FDF1EC;
    --black:     #111111; --white:     #ffffff;
    --grey-100:  #f5f5f5; --grey-200:  #e8e8e8; --grey-400:  #999999; --grey-600:  #555555;
    --green:     #2E7D32; --green-lt:  #E8F5E9;
    --amber:     #B45309; --amber-lt:  #FEF3C7;
    --red:       #B91C1C; --red-lt:    #FEE2E2;
    --blue:      #1565C0; --blue-lt:   #E3F0FF;
    --sans:      'Figtree', sans-serif;
    --mono:      'IBM Plex Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--grey-100); color: var(--black); font-family: var(--sans); min-height: 100vh; }

  /* ── Topbar ── */
  .topbar { background: var(--black); padding: 0 2rem; height: 48px; display: flex; align-items: center; }
  .topbar-logo { height: 26px; width: auto; display: block; }

  /* ── Header ── */
  header { border-bottom: 2px solid var(--black); background: var(--white); }
  .header-inner { max-width: 1280px; margin: 0 auto; padding: 2rem 2rem 1.75rem; }

  .breadcrumb { font-family: var(--mono); font-size: 0.62rem; color: var(--grey-400); margin-bottom: 1rem; text-transform: uppercase; }
  .breadcrumb a { color: var(--orange); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  h1 { font-size: clamp(1.6rem, 3vw, 2.5rem); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem; }

  .node-meta { font-family: var(--mono); font-size: 0.65rem; color: var(--grey-600); line-height: 1.8; }
  .node-meta a { color: var(--orange); text-decoration: none; }
  .node-meta a:hover { text-decoration: underline; }

  /* ── Overview stat strip ── */
  .overview-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    border: 1px solid var(--grey-200);
    background: var(--white);
    margin-bottom: 1.5rem;
  }
  .ov-card { padding: 1.5rem; border-right: 1px solid var(--grey-200); }
  .ov-card:last-child { border-right: none; }
  .ov-value { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; color: var(--black); line-height: 1; }
  .ov-value.green  { color: var(--green); }
  .ov-value.amber  { color: var(--amber); }
  .ov-value.red    { color: var(--red); }
  .ov-value.orange { color: var(--orange); }
  .ov-label { font-family: var(--mono); font-size: 0.6rem; color: var(--grey-400); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.5rem; }

  /* ── Panels ── */
  main { max-width: 1280px; margin: 0 auto; padding: 2rem; }

  .panel { border: 1px solid var(--grey-200); margin-bottom: 1.25rem; background: var(--white); }
  .panel-header {
    background: var(--grey-100); padding: 1rem 1.25rem;
    font-weight: 700; text-transform: uppercase; font-size: 0.72rem;
    letter-spacing: 0.08em;
    display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
    border-bottom: 1px solid var(--grey-200);
  }
  .panel-header-left { display: flex; align-items: center; gap: 0.6rem; }
  .panel-icon { font-size: 0.9rem; }
  .panel-body  { padding: 1.5rem; }
  .panel-missing {
    padding: 2rem 1.5rem; font-family: var(--mono); font-size: 0.72rem;
    color: var(--grey-400); text-align: center; border-top: 1px solid var(--grey-200);
  }

  /* ── Endpoint cards ── */
  .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; }
  .ep-card { border: 1px solid var(--grey-200); padding: 1rem; }
  .ep-cap-type { font-weight: 700; font-size: 0.88rem; margin-bottom: 0.4rem; }
  .ep-url { font-family: var(--mono); font-size: 0.68rem; color: var(--grey-600); word-break: break-all; margin-bottom: 0.5rem; }
  .status-tag { display: inline-block; font-family: var(--mono); font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 3px; }
  .status-available { background: var(--green-lt); color: var(--green); }
  .status-error     { background: var(--red-lt);   color: var(--red);   }
  .ep-version { font-size: 0.6rem; color: var(--grey-400); margin-top: 0.5rem; font-family: var(--mono); }

  /* ── Catalogue table ── */
  .cat-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .cat-table th { font-family: var(--mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey-400); text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid var(--grey-200); }
  .cat-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--grey-200); vertical-align: top; }
  .cat-table tr:last-child td { border-bottom: none; }
  .cat-table tr:hover td { background: var(--grey-100); }
  .cat-name { font-weight: 600; }
  .cat-url  { font-family: var(--mono); font-size: 0.65rem; color: var(--grey-600); word-break: break-all; }
  .cat-url a { color: var(--orange); text-decoration: none; }
  .cat-url a:hover { text-decoration: underline; }

  /* ── ARGO services ── */
  .argo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
  .argo-card { border: 1px solid var(--grey-200); padding: 1rem; }
  .argo-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 0.5rem; }
  .argo-uptime-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.35rem; }
  .argo-bar-track { flex: 1; height: 4px; background: var(--grey-200); border-radius: 2px; overflow: hidden; }
  .argo-bar-fill  { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .argo-bar-fill.high   { background: var(--green); }
  .argo-bar-fill.medium { background: var(--amber); }
  .argo-bar-fill.low    { background: var(--red); }
  .argo-pct { font-family: var(--mono); font-size: 0.7rem; font-weight: 600; min-width: 3rem; text-align: right; }
  .argo-pct.high   { color: var(--green); }
  .argo-pct.medium { color: var(--amber); }
  .argo-pct.low    { color: var(--red); }
  .argo-meta { font-family: var(--mono); font-size: 0.6rem; color: var(--grey-400); margin-top: 0.4rem; }

  /* ── JSON raw fallback ── */
  .raw-panel { background: var(--grey-100); border: 1px solid var(--grey-200); padding: 1rem 1.25rem; font-family: var(--mono); font-size: 0.68rem; color: var(--grey-600); overflow-x: auto; white-space: pre; max-height: 400px; overflow-y: auto; }

  /* ── Badge pill ── */
  .badge { font-family: var(--mono); font-size: 0.58rem; padding: 0.2rem 0.55rem; border-radius: 3px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge-ok      { background: var(--green-lt); color: var(--green); }
  .badge-warn    { background: var(--amber-lt); color: var(--amber); }
  .badge-error   { background: var(--red-lt);   color: var(--red);   }
  .badge-missing { background: var(--grey-200); color: var(--grey-600); }

  /* ── State messages ── */
  .state-msg { text-align: center; padding: 5rem; font-family: var(--mono); color: var(--grey-400); }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">
    <img src="logo-eosc-beyond-horizontal-fc.png" alt="EOSC Beyond" class="topbar-logo">
  </a>
</div>

<header>
  <div class="header-inner">
    <div class="breadcrumb"><a href="index.html">Dashboard</a> / Node Detail</div>
    <h1 id="display-node-name">Loading…</h1>
    <div class="node-meta" id="node-meta-info"></div>
  </div>
</header>

<main id="main-content">
  <div class="state-msg">Initialising…</div>
</main>

<script>
// ── Fetch helper ──────────────────────────────────────────────────────────────

async function tryFetchJSON(url) {
  try {
    const r = await fetch(url);
    return r.ok ? r.json() : null;
  } catch { return null; }
}

// ── Colour helpers ────────────────────────────────────────────────────────────

function uptimeClass(pct) {
  if (pct >= 90) return 'high';
  if (pct >= 60) return 'medium';
  return 'low';
}

function uptimeColour(pct) {
  if (pct >= 90) return 'green';
  if (pct >= 60) return 'amber';
  return 'red';
}

// ── Overview strip ────────────────────────────────────────────────────────────

function buildOverview(ep, cat, argo) {
  const cards = [];

  // Endpoints
  if (ep && Array.isArray(ep.capabilities)) {
    const total = ep.capabilities.length;
    const avail = ep.capabilities.filter(c => c.status === 'Available').length;
    const pct   = total > 0 ? Math.round(avail / total * 100) : 0;
    const cls   = pct === 100 ? 'green' : pct >= 50 ? 'amber' : 'red';
    cards.push(`
      <div class="ov-card">
        <div class="ov-value ${cls}">${avail}/${total}</div>
        <div class="ov-label">Endpoints available</div>
      </div>`);
  } else {
    cards.push(`<div class="ov-card"><div class="ov-value" style="color:var(--grey-400)">—</div><div class="ov-label">Endpoints available</div></div>`);
  }

  // Catalogue services
  if (cat) {
    console.debug('[catalogue overview]', Object.keys(cat));
    const total  = typeof cat.total_services === 'number' ? cat.total_services
                 : Array.isArray(cat.services) ? cat.services.length : '—';
    let active = null;
    if (typeof cat.active_services === 'number' && cat.active_services > 0) {
      active = cat.active_services;
    } else if (Array.isArray(cat.services) && cat.services.length > 0) {
      console.debug('[catalogue overview] first service keys:', Object.keys(cat.services[0]));
      const first = cat.services[0];
      if (typeof first.status === 'string') {
        const activeVals = new Set(['active','Active','ACTIVE','available','Available','ok','OK','published','Published']);
        const n = cat.services.filter(s => activeVals.has(s.status)).length;
        if (n > 0) active = n;
      } else if (typeof first.active === 'boolean') {
        active = cat.services.filter(s => s.active === true).length;
      }
    }
    cards.push(`
      <div class="ov-card">
        <div class="ov-value orange">${active !== null ? active : total}</div>
        <div class="ov-label">${active !== null ? 'Active catalogue services' : 'Catalogue services'}</div>
      </div>`);
  } else {
    cards.push(`<div class="ov-card"><div class="ov-value" style="color:var(--grey-400)">—</div><div class="ov-label">Catalogue services</div></div>`);
  }

  // ARGO uptime
  if (argo) {
    let uptime = null;
    if (typeof argo.uptime_percentage === 'number') {
      uptime = Math.round(argo.uptime_percentage * 10) / 10;
    } else {
      const _items = Array.isArray(argo.endpoints) ? argo.endpoints
                   : Array.isArray(argo.services)  ? argo.services : [];
      const vals = _items.map(s => s.uptime_percentage ?? s.average_availability ?? s.availability ?? null).filter(v => v !== null);
      if (vals.length) uptime = Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 10) / 10;
    }
    if (uptime !== null) {
      cards.push(`
        <div class="ov-card">
          <div class="ov-value ${uptimeColour(uptime)}">${uptime}%</div>
          <div class="ov-label">Avg ARGO uptime</div>
        </div>`);
    }
  } else {
    cards.push(`<div class="ov-card"><div class="ov-value" style="color:var(--grey-400)">—</div><div class="ov-label">Avg ARGO uptime</div></div>`);
  }

  return `<div class="overview-strip">${cards.join('')}</div>`;
}

// ── Endpoint Report panel ─────────────────────────────────────────────────────

function renderEndpointPanel(data) {
  if (!data) {
    return `<div class="panel">
      <div class="panel-header"><div class="panel-header-left"><span class="panel-icon">🔌</span> Endpoint Connectivity Report</div>
        <span class="badge badge-missing">Not available</span></div>
      <div class="panel-missing">endpoint_report.json was not found for this node.</div>
    </div>`;
  }

  const caps = Array.isArray(data.capabilities) ? data.capabilities : [];
  if (caps.length === 0) {
    return `<div class="panel">
      <div class="panel-header"><div class="panel-header-left"><span class="panel-icon">🔌</span> Endpoint Connectivity Report</div></div>
      <div class="panel-missing">No capabilities listed in this report.</div>
    </div>`;
  }

  const avail = caps.filter(c => c.status === 'Available').length;
  const pct   = Math.round(avail / caps.length * 100);
  const bCls  = pct === 100 ? 'badge-ok' : pct >= 50 ? 'badge-warn' : 'badge-error';

  const cards = caps.map(cap => {
    const sc = cap.status === 'Available' ? 'status-available' : 'status-error';
    return `
      <div class="ep-card">
        <div class="ep-cap-type">${cap.capability_type || '(unknown type)'}</div>
        <div class="ep-url">${cap.endpoint || ''}</div>
        <span class="status-tag ${sc}">${cap.status} (${cap.http_code ?? '?'})</span>
        ${cap.version ? `<div class="ep-version">Version: ${cap.version}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-header-left"><span class="panel-icon">🔌</span> Endpoint Connectivity Report</div>
        <span class="badge ${bCls}">${avail}/${caps.length} available</span>
      </div>
      <div class="panel-body"><div class="ep-grid">${cards}</div></div>
    </div>`;
}

// ── Catalogue Services panel ──────────────────────────────────────────────────

function renderCataloguePanel(data) {
  if (!data) {
    return `<div class="panel">
      <div class="panel-header"><div class="panel-header-left"><span class="panel-icon">📚</span> Catalogue Services Report</div>
        <span class="badge badge-missing">Not available</span></div>
      <div class="panel-missing">catalogue_services_report.json was not found for this node.</div>
    </div>`;
  }

  // Normalise to an array of service objects
  let services = [];
  if (Array.isArray(data.services)) {
    services = data.services;
  } else if (typeof data.total_services === 'number') {
    // File exists but has no services array — show raw summary
    return `
      <div class="panel">
        <div class="panel-header">
          <div class="panel-header-left"><span class="panel-icon">📚</span> Catalogue Services Report</div>
          <span class="badge badge-ok">${data.total_services} services</span>
        </div>
        <div class="panel-body">
          <details><summary style="cursor:pointer;font-family:var(--mono);font-size:0.7rem;color:var(--grey-600);">Show raw JSON</summary>
          <div class="raw-panel">${JSON.stringify(data, null, 2)}</div></details>
        </div>
      </div>`;
  }

  if (services.length === 0) {
    return `<div class="panel">
      <div class="panel-header"><div class="panel-header-left"><span class="panel-icon">📚</span> Catalogue Services Report</div></div>
      <div class="panel-missing">No services listed in this report.</div>
    </div>`;
  }

  const rows = services.map(s => {
    const name   = s.name || s.title || s.id || '(unnamed)';
    const abbr   = s.abbreviation || null;
    const url    = s.url  || s.webpage || s.endpoint || s.landing_page || null;
    const status = s.status ?? (s.active === true ? 'active' : s.active === false ? 'inactive' : null);
    const activeVals = new Set(['active','Active','ACTIVE','available','Available','ok','OK','published','Published']);
    const isActive = status !== null ? activeVals.has(status) : null;
    const statusBadge = status
      ? `<span class="badge ${isActive ? 'badge-ok' : 'badge-missing'}">${status}</span>`
      : '';
    return `
      <tr>
        <td><div class="cat-name">${name}${abbr ? ` <span style="font-family:var(--mono);font-size:0.65rem;color:var(--grey-400);font-weight:400;">(${abbr})</span>` : ''}</div></td>
        <td><div class="cat-url">${url ? `<a href="${url}" target="_blank" rel="noreferrer">${url}</a>` : '—'}</div></td>
        <td>${statusBadge}</td>
      </tr>`;
  }).join('');

  return `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-header-left"><span class="panel-icon">📚</span> Catalogue Services Report</div>
        <span class="badge badge-ok">${services.length} services</span>
      </div>
      <div class="panel-body">
        <table class="cat-table">
          <thead><tr><th>Name</th><th>URL</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── ARGO Uptime panel ─────────────────────────────────────────────────────────

function renderArgoPanel(data) {
  if (!data) {
    return `<div class="panel">
      <div class="panel-header"><div class="panel-header-left"><span class="panel-icon">📡</span> ARGO Uptime Report</div>
        <span class="badge badge-missing">Not available</span></div>
      <div class="panel-missing">argo_uptime_report.json was not found for this node.</div>
    </div>`;
  }

  // Normalise to array of { name, uptime_percentage }
  let services = [];
  if (Array.isArray(data.endpoints)) {
    services = data.endpoints;  // argo_uptime_report uses 'endpoints' as the array key
  } else if (Array.isArray(data.services)) {
    services = data.services;
  } else if (typeof data.uptime_percentage === 'number') {
    // Top-level single uptime value
    services = [{ name: data.service_name || data.name || 'Overall', uptime_percentage: data.uptime_percentage }];
  }

  // Header summary
  let avgUptime = null;
  if (services.length > 0) {
    const vals = services.map(s => s.uptime_percentage ?? s.availability ?? null).filter(v => v !== null);
    if (vals.length) avgUptime = Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 10) / 10;
  }

  const headerBadge = avgUptime !== null
    ? `<span class="badge badge-${avgUptime >= 90 ? 'ok' : avgUptime >= 60 ? 'warn' : 'error'}">${avgUptime}% avg</span>`
    : `<span class="badge badge-missing">No uptime data</span>`;

  if (services.length === 0) {
    return `
      <div class="panel">
        <div class="panel-header">
          <div class="panel-header-left"><span class="panel-icon">📡</span> ARGO Uptime Report</div>
          ${headerBadge}
        </div>
        <div class="panel-body">
          <details><summary style="cursor:pointer;font-family:var(--mono);font-size:0.7rem;color:var(--grey-600);">Show raw JSON</summary>
          <div class="raw-panel">${JSON.stringify(data, null, 2)}</div></details>
        </div>
      </div>`;
  }

  const cards = services.map(s => {
    const name   = s.name || s.service_name || s.id || '(unnamed)';
    const pct    = s.uptime_percentage ?? s.average_availability ?? s.availability ?? null;
    const cls    = pct !== null ? uptimeClass(pct) : 'low';
    const width  = pct !== null ? pct : 0;
    const period = s.period || s.time_period || null;

    return `
      <div class="argo-card">
        <div class="argo-name">${name}</div>
        ${pct !== null ? `
        <div class="argo-uptime-row">
          <div class="argo-bar-track"><div class="argo-bar-fill ${cls}" style="width:${width}%"></div></div>
          <span class="argo-pct ${cls}">${pct}%</span>
        </div>` : '<div class="argo-meta">No uptime value</div>'}
        ${s.days_monitored ? `<div class="argo-meta">${s.days_monitored} days monitored</div>` : ''}
        ${period ? `<div class="argo-meta">Period: ${period}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-header-left"><span class="panel-icon">📡</span> ARGO Uptime Report</div>
        ${headerBadge}
      </div>
      <div class="panel-body"><div class="argo-grid">${cards}</div></div>
    </div>`;
}

// ── Header meta block ─────────────────────────────────────────────────────────

function buildMeta(ep, cat, argo, nodeName) {
  // Pull the richest identity info we can from whichever files are present
  const source = ep || cat || argo || {};
  const name      = source.node_name     || nodeName;
  const provider  = source.legal_entity?.name || source.provider || null;
  const endpoint  = source.node_endpoint || source.endpoint      || null;
  const pid       = source.node_pid      || source.pid           || null;

  document.getElementById('display-node-name').textContent = name;

  const lines = [];
  if (provider) lines.push(`<div><strong>Provider:</strong> ${provider}</div>`);
  if (endpoint) lines.push(`<div><strong>Endpoint:</strong> <a href="${endpoint}" target="_blank" rel="noreferrer">${endpoint}</a></div>`);
  if (pid)      lines.push(`<div><strong>PID:</strong> ${pid}</div>`);

  document.getElementById('node-meta-info').innerHTML = lines.join('');
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  const main     = document.getElementById('main-content');
  const nodeName = decodeURIComponent(window.location.hash.substring(1));

  if (!nodeName) {
    main.innerHTML = '<div class="state-msg">Error: No node specified in URL hash (e.g. node.html#CESSDA).</div>';
    return;
  }

  document.getElementById('display-node-name').textContent = nodeName;
  document.title = `${nodeName} — EOSC Beyond Node Dashboard`;

  const base = `/api/data/${encodeURIComponent(nodeName)}`;

  // Fetch all three reports simultaneously — each can independently be null
  const [ep, cat, argo] = await Promise.all([
    tryFetchJSON(`${base}/endpoint_report.json`),
    tryFetchJSON(`${base}/catalogue_services_report.json`),
    tryFetchJSON(`${base}/argo_uptime_report.json`),
  ]);

  // If all three are null the node path itself is probably wrong
  if (!ep && !cat && !argo) {
    main.innerHTML = `
      <div class="state-msg">
        No report files found for <strong>${nodeName}</strong>.<br>
        Expected path: <code>${base}/</code>
      </div>`;
    return;
  }

  buildMeta(ep, cat, argo, nodeName);

  main.innerHTML = `
    ${buildOverview(ep, cat, argo)}
    ${renderEndpointPanel(ep)}
    ${renderCataloguePanel(cat)}
    ${renderArgoPanel(argo)}
  `;
}

// Re-run if the hash changes (navigating between nodes without page reload)
window.addEventListener('hashchange', init);
init();
</script>
</body>
</html>
