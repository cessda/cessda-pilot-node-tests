# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Static resources ──────────────────────────────────────────────────────────
# Serve static files from classpath:/static/ — index.html, node.html, logo
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ── Dashboard data directory ──────────────────────────────────────────────────
# Path to the directory containing node_registry_summary.json and the per-node
# subdirectories. Override per environment:
#
#   Local (running from project root via mvn spring-boot:run):
#     dashboard.data-dir=src/main/dashboard/data
#
#   Cloud / container (data mounted as a volume):
#     dashboard.data-dir=/data/dashboard
#
#   Override via environment variable (takes precedence):
#     export DASHBOARD_DATA_DIR=/data/dashboard
#
dashboard.data-dir=dashboard/data
